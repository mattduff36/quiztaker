name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      NEON_AUTH_BASE_URL: https://example.neonauth.us-east-1.aws.neon.tech
      NEON_AUTH_COOKIE_SECRET: test-only-cookie-secret-with-32-characters
      ALLOWED_EMAIL: operator@example.com
      HELPER_MASTER_KEY: test-only-master-key-with-32-characters
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      GITHUB_REPOSITORY: mattduff36/quiztaker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
